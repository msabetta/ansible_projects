---
# Variables applied to all hosts in the inventory

# System variables
ansible_user: ansible
ansible_password: "{{ vault_ansible_password }}"
ansible_become: true
ansible_become_method: sudo

# Common paths
app_base_path: /opt/applications
log_base_path: /var/log/applications
config_base_path: /etc/applications

# Package management
package_manager_cache_valid_time: 3600
upgrade_packages: false

# Network configuration
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org

# Service defaults
service_state: started
service_enabled: true

# Monitoring
enable_monitoring: true
monitoring_agent: prometheus

# Environment
environment_type: production
timezone: UTC