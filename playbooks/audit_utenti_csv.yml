---
- name: Audit utenti Linux -> CSV
  hosts: all
  become: yes
  gather_facts: yes
  serial: 1

  vars:
    output_dir: "/root/ansible/audit_csv"

  tasks:

    - name: Crea directory output locale
      delegate_to: master1.local
      run_once: true
      file:
        path: "{{ output_dir }}"
        state: directory
        mode: "0755"

    - name: Estrai utenti da /etc/passwd
      shell: |
        awk -F: '{print $1","$3","$4","$6","$7}' /etc/passwd
      register: users_raw

    - name: Estrai gruppi utenti
      shell: |
        getent group | awk -F: '{print $1":"$4}'
      register: groups_raw

    - name: Ultimo login utenti
      shell: lastlog | tail -n +2
      register: lastlog_raw
      ignore_errors: yes

    - name: Costruisci CSV
      set_fact:
        csv_content: |
          username,uid,gid,home,shell
          {{ users_raw.stdout }}

    - name: Salva CSV su controller
      delegate_to: master1.local
      copy:
        content: "{{ csv_content }}"
        dest: "{{ output_dir }}/{{ inventory_hostname }}.csv"
