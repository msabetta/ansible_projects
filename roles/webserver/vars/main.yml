---
# Webserver role variables

# Server configuration
webserver_user: www-data
webserver_group: www-data
webserver_port: 80
webserver_ssl_port: 443

# Service management
webserver_service_name: nginx
webserver_service_state: started
webserver_service_enabled: true

# Document root
webserver_document_root: /var/www/html

# SSL/TLS configuration
webserver_ssl_enabled: false
webserver_ssl_certificate_path: /etc/ssl/certs
webserver_ssl_key_path: /etc/ssl/private

# Performance tuning
webserver_worker_processes: auto
webserver_worker_connections: 768
webserver_keepalive_timeout: 65

# Logging
webserver_access_log: /var/log/nginx/access.log
webserver_error_log: /var/log/nginx/error.log
webserver_log_level: warn

# Security
webserver_enable_gzip: true
webserver_client_max_body_size: 20m
webserver_server_tokens: false