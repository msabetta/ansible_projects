---
- name: Update package manager
  apt:
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install nginx
  package:
    name: nginx
    state: present

- name: Start and enable nginx service
  systemd:
    name: nginx
    state: started
    enabled: yes

- name: Copy nginx configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    backup: yes
  notify: restart nginx

- name: Create webroot directory
  file:
    path: /var/www/html
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deploy website content
  copy:
    src: index.html
    dest: /var/www/html/
    owner: www-data
    group: www-data
    mode: '0644'

- name: Ensure nginx is running
  systemd:
    name: nginx
    state: started